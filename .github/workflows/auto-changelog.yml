name: Auto-update Changelog

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # Don't run on commits made by this action (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[changelog-bot]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit log

      - name: Get commit details and update files
        id: update
        run: |
          # Get commits from this push that modified index.html or sw.js
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi

          # Get commit messages (skip any changelog-bot commits)
          MESSAGES=$(git log --pretty=format:"%s" "$BEFORE..HEAD" -- index.html sw.js manifest.json | grep -v '\[changelog-bot\]' || true)

          if [ -z "$MESSAGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Store messages for Python script
          echo "$MESSAGES" > /tmp/commit_messages.txt

          # Use Python for reliable multiline file manipulation
          python3 << 'PYEOF'
import re, datetime

# Read commit messages
with open('/tmp/commit_messages.txt') as f:
    messages = [line.strip() for line in f if line.strip() and not line.startswith('Co-Authored-By')]

if not messages:
    print("No messages to process")
    exit(0)

# Read index.html
with open('index.html') as f:
    html = f.read()

# Find current max version
versions = re.findall(r"version:\s*'(\d+\.\d+)'", html)
if versions:
    major, minor = versions[0].split('.')
    next_version = f"{major}.{int(minor) + 1}"
else:
    next_version = "3.4"

# Build the changelog entry
date = datetime.date.today().isoformat()
title = messages[0][:60]
items_js = ',\n'.join(f"      '{msg.replace(chr(39), chr(92) + chr(39))}'" for msg in messages)

entry = f"""  {{
    version: '{next_version}',
    date: '{date}',
    title: '{title.replace(chr(39), chr(92) + chr(39))}',
    items: [
{items_js}
    ]
  }},"""

# Insert after "const CHANGELOG = ["
marker = "const CHANGELOG = ["
idx = html.find(marker)
if idx == -1:
    print("ERROR: Could not find CHANGELOG marker")
    exit(1)

insert_pos = idx + len(marker)
html = html[:insert_pos] + "\n" + entry + html[insert_pos:]

with open('index.html', 'w') as f:
    f.write(html)

print(f"Added changelog entry v{next_version}: {title}")

# Bump service worker cache version
with open('sw.js') as f:
    sw = f.read()

cache_match = re.search(r'avery-dashboard-v(\d+)', sw)
if cache_match:
    old_ver = int(cache_match.group(1))
    sw = sw.replace(f'avery-dashboard-v{old_ver}', f'avery-dashboard-v{old_ver + 1}')
    with open('sw.js', 'w') as f:
        f.write(sw)
    print(f"Bumped cache to v{old_ver + 1}")
PYEOF

      - name: Commit and push
        if: steps.update.outputs.skip == 'false'
        run: |
          git config user.name "changelog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "[changelog-bot] Auto-update changelog and cache version"
          git push
